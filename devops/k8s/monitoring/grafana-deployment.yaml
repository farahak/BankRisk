apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - name: grafana
          containerPort: 3000
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "500Mi"
            cpu: "500m"

        volumeMounts:
          - mountPath: /var/lib/grafana
            name: grafana-storage

          - mountPath: /etc/grafana/provisioning/datasources
            name: grafana-datasources
            readOnly: false

          # ✅ Ton dashboard Django
          - name: dash-provider
            mountPath: /etc/grafana/provisioning/dashboards/django
            readOnly: true

      volumes:
        - name: grafana-storage
          emptyDir: {}

        - name: grafana-datasources
          configMap:
            defaultMode: 420
            name: grafana-datasources
        - name: dash-provider
          configMap:
            name: dash-provider

        # ✅ Ton configMap dashboard Django
        - name: grafana-dashboard-django
          configMap:
            name: grafana-dashboard-django
