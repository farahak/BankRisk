version: '3.8'

services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      - mongo
    environment:
      - DJANGO_DB_HOST=mongo
      - DJANGO_DB_PORT=27017
      - DJANGO_DB_NAME=bankrisk

  frontend:
    build: ../frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
