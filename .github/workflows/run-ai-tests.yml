name: Run AI Generated Tests (BankRisk)

on:
  repository_dispatch:
    types: [run-ai-test]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django

      - name: Write Generated Test File
        run: |
          mkdir -p backend/credit/tests
          echo "${{ github.event.client_payload.test_code }}" > backend/credit/tests/test_generated.py

      - name: Run Django Tests
        id: run_django_tests
        run: |
          cd backend
          python manage.py test credit.tests.test_generated --tb=short > test_logs.txt 2>&1
        continue-on-error: true

      - name: Send Callback to AutoTestGenerator
      if: always() # IMPORTANT: Force l'exécution même si une étape précédente a échoué
        run: |
          STATUS="true"
          if [ "${{ steps.run_django_tests.outcome }}" != "success" ]; then
            STATUS="false"
          fi
          
          # Sécuriser la lecture des logs (créer le fichier s'il n'existe pas)
          touch backend/test_logs.txt
          LOGS=$(cat backend/test_logs.txt)
          
          curl -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"testRunId\": \"${{ github.event.client_payload.test_run_id }}\",
              \"success\": $STATUS,
              \"logs\": $(echo \"$LOGS\" | jq -R -s '.'),
              \"errorMessage\": \"Workflow completed with status: ${{ job.status }}\"
            }"
